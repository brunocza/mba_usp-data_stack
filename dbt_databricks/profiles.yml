dbt_databricks:
  target: dbx
  outputs:
    dbx:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      catalog: workspace
      schema: default
      threads: 4
      connect_timeout: 60
      connect_retries: 3
