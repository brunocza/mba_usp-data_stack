name: dbt_demo
version: '1.0.0'
config-version: 2

profile: dbt_demo

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_demo:
    example:
      +materialized: table
      +schema: dbt_demo
    silver:
      +materialized: table
      +schema: silver_nyc_taxi
      +tags: ["silver"]
    gold:
      +materialized: table
      +schema: gold_nyc_taxi
      +tags: ["gold"]
