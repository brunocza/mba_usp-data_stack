dbt_demo:
  target: dev
  outputs:
    dev:
      type: clickhouse
      driver: native
      host: "{{ env_var('CLICKHOUSE_HOST', 'clickhouse.warehouse.svc.cluster.local') }}"
      port: "{{ env_var('CLICKHOUSE_PORT', '9000') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD') }}"
      schema: "{{ env_var('CLICKHOUSE_SCHEMA', 'dbt_demo') }}"
      secure: false
      verify: false
      connect_timeout: 10
      send_receive_timeout: 300
      sync_request_timeout: 5
      compress_block_size: 1048576
