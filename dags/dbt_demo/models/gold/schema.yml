version: 2

models:
  - name: daily_revenue
    description: "Receita, viagens e métricas operacionais por dia."
    columns:
      - name: trip_date
        tests: [not_null, unique]
      - name: gross_revenue_usd
        tests: [not_null]

  - name: hourly_demand
    description: "Demanda por (dia da semana, hora do dia) — heatmap clássico."
    columns:
      - name: weekday
        tests: [not_null]
      - name: hour_of_day
        tests: [not_null]

  - name: borough_pairs
    description: "Top OD pairs entre boroughs por volume."
    columns:
      - name: pickup_borough
        tests: [not_null]
      - name: dropoff_borough
        tests: [not_null]

  - name: driver_economics
    description: "Como os motoristas se saíram mês a mês."
    columns:
      - name: month
        tests: [not_null, unique]

  - name: shared_vs_solo
    description: "Comparativo de viagens compartilhadas (matched/unmatched) vs solo."
    columns:
      - name: ride_type
        tests: [not_null, unique]
