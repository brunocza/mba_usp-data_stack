version: 2

models:
  - name: first_model
    description: "10 linhas sintéticas materializadas como table no ClickHouse"
    columns:
      - name: id
        description: "Primary id from system.numbers"
        tests:
          - not_null
          - unique
      - name: name
        description: "String representation of id"
      - name: loaded_at
        description: "Timestamp da materialização"
