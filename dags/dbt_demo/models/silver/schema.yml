version: 2

models:
  - name: fhvhv_trips_clean
    description: "HVFHV trips com tipos forçados, filtros de qualidade e métricas derivadas."
    columns:
      - name: pickup_at
        tests: [not_null]
      - name: dropoff_at
        tests: [not_null]
      - name: base_fare
        tests: [not_null]
      - name: trip_minutes
        tests: [not_null]
      - name: total_amount
        tests: [not_null]

  - name: fhvhv_trips_enriched
    description: "fhvhv_trips_clean + nomes de borough/zona de pickup e dropoff via lookup."
    columns:
      - name: pickup_at
        tests: [not_null]
      - name: pickup_borough
        description: "Nome do borough de origem (Manhattan, Queens, etc.) — pode ser NULL se LocationID inválido."
