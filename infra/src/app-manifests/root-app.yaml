apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/brunocza/mba_usp-data_stack.git'
    path: infra/src/app-manifests
    targetRevision: main
    directory:
      recurse: true
      exclude: root-app.yaml
  destination:
    name: in-cluster
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
