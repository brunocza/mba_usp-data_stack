apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/brunocza/mba_usp-data_stack.git'
    path: infra/src/helm-charts/grafana
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
  destination:
    name: in-cluster
    namespace: monitorability
    server: ''
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      # Dashboard ConfigMaps (node-exporter-full is ~683 KB) exceed the
      # 256 KB kubectl.kubernetes.io/last-applied-configuration annotation
      # limit when using client-side apply. Server-side apply skips that
      # annotation entirely.
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true

