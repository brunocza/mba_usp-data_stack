image:
  repository: bitsondatadev/hive-metastore
  tag: latest
  pullPolicy: IfNotPresent

mariadb:
  primary:
    persistence:
      enabled: true
      storageClass: nfs-client  # Defina o storageClass aqui
      accessModes:
        - ReadWriteOnce
      size: 8Gi  # Tamanho do volume
  auth:
    username: hive
    database: metastore
    rootPassword: root
    password: root

replicas: 1
resources: {}
conf:
  hiveSite:
    hive_metastore_uris: thrift://hive-metastore:9083
    hive.metastore.warehouse.dir: s3a://metastore/warehouse/
    fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    # Credenciais MinIO injetadas via secret K8s — NÃO commitar valores literais.
    # Para deploy real, parametrize via tpl + envFrom + Secret pré-criado.
    fs.s3a.access.key: "<provided-via-secret>"
    fs.s3a.secret.key: "<provided-via-secret>"
    fs.s3a.endpoint: http://minio.deepstorage.svc.Cluster.local
    fs.s3a.path.style.access: true
    fs.s3a.connection.ssl.enabled: false


env:
  - name: SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: hive-metastore-secret-key
        key: password