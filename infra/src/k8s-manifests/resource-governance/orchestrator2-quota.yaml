---
# ResourceQuota — contém o blast radius do stress test no namespace do Airflow
# Soma de requests+limits dos pods do ns não pode ultrapassar estes valores.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: orchestrator2-quota
  namespace: orchestrator2
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 10Gi
    limits.cpu: "14"
    limits.memory: 16Gi
    pods: "50"
---
# LimitRange — pods criados sem resources.requests/limits recebem estes defaults.
# Valores BAIXOS porque os principais workloads (scheduler, worker, etc.) já
# declaram resources no values.yaml do chart. Os sidecars que caem aqui
# (git-sync, log-groomer, dbt-docs, statsd) consomem muito pouco e não
# justificam defaults agressivos que inflariam o total por pod.
apiVersion: v1
kind: LimitRange
metadata:
  name: orchestrator2-defaults
  namespace: orchestrator2
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 20m
        memory: 64Mi
      max:
        cpu: "4"
        memory: 4Gi
