---
# ResourceQuota — namespace do ClickHouse (alvo de stress de ingestão de dados)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: warehouse-quota
  namespace: warehouse
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 10Gi
    limits.cpu: "6"
    limits.memory: 10Gi
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: warehouse-defaults
  namespace: warehouse
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 1Gi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      max:
        cpu: "6"
        memory: 10Gi
