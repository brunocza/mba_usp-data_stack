apiVersion: v1
kind: Namespace
metadata:
  name: spark-rapids
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-thrift-server
  namespace: spark-rapids
  labels:
    app: spark-thrift-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-thrift-server
  template:
    metadata:
      labels:
        app: spark-thrift-server
    spec:
      containers:
        - name: spark-thrift
          image: bx-spark-rapids:3.5.2
          imagePullPolicy: IfNotPresent
          command:
            - /opt/spark/sbin/start-thriftserver.sh
          args:
            - --master
            - "local[*]"
            - --conf
            - spark.plugins=com.nvidia.spark.SQLPlugin
            - --conf
            - spark.rapids.sql.enabled=true
            - --conf
            - spark.executor.resource.gpu.amount=1
            - --conf
            - spark.task.resource.gpu.amount=1
            - --conf
            - spark.executor.resource.gpu.discoveryScript=/opt/spark/getGpusResources.sh
            - --conf
            - spark.driver.resource.gpu.amount=1
            - --conf
            - spark.driver.resource.gpu.discoveryScript=/opt/spark/getGpusResources.sh
            - --conf
            - spark.rapids.sql.concurrentGpuTasks=2
            - --conf
            - spark.sql.adaptive.enabled=true
            - --conf
            - "spark.driver.memory=4g"
            - --conf
            - "spark.executor.memory=4g"
            - --conf
            - "spark.driver.maxResultSize=2g"
            # S3A / MinIO config
            - --conf
            - spark.hadoop.fs.s3a.endpoint=http://minio.deepstorage.svc.cluster.local:80
            - --conf
            - spark.hadoop.fs.s3a.access.key=data-lake
            - --conf
            - spark.hadoop.fs.s3a.secret.key=12620ee6-2162-11ee-be56-0242ac120002
            - --conf
            - spark.hadoop.fs.s3a.path.style.access=true
            - --conf
            - spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
            - --conf
            - spark.hadoop.fs.s3a.connection.ssl.enabled=false
            # Hive metastore in local Derby (embedded, no external dependency)
            - --conf
            - spark.sql.warehouse.dir=file:///tmp/spark-warehouse
            - --conf
            - spark.hive.server2.thrift.port=10000
            - --conf
            - spark.hive.server2.thrift.bind.host=0.0.0.0
          ports:
            - name: thrift
              containerPort: 10000
            - name: spark-ui
              containerPort: 4040
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
          readinessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: spark-thrift
  namespace: spark-rapids
spec:
  type: LoadBalancer
  selector:
    app: spark-thrift-server
  ports:
    - name: thrift
      port: 10000
      targetPort: 10000
    - name: spark-ui
      port: 4040
      targetPort: 4040
