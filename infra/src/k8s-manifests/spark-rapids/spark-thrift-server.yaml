apiVersion: v1
kind: Namespace
metadata:
  name: spark-rapids
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: spark-rapids
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spark-rapids-role
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: spark
    namespace: spark-rapids
---
# Spark Thrift Server — client mode, CPU only.
# GPU acceleration happens via batch SparkApplication jobs (cluster mode)
# dispatched by Airflow for each dbt model, where the executor pod gets
# the GPU. The Thrift Server is a long-running JDBC endpoint for Metabase
# and interactive queries.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-thrift-server
  namespace: spark-rapids
  labels:
    app: spark-thrift-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-thrift-server
  template:
    metadata:
      labels:
        app: spark-thrift-server
    spec:
      serviceAccountName: spark
      containers:
        - name: spark-thrift
          image: bx-spark-rapids:3.5.2
          imagePullPolicy: IfNotPresent
          command:
            - /opt/spark/bin/spark-submit
          args:
            - --class
            - org.apache.spark.sql.hive.thriftserver.HiveThriftServer2
            - --master
            - "local[*]"
            - --conf
            - spark.sql.adaptive.enabled=true
            - --conf
            - "spark.driver.memory=4g"
            - --conf
            - "spark.driver.maxResultSize=2g"
            # S3A / MinIO config
            - --conf
            - spark.hadoop.fs.s3a.endpoint=http://minio.deepstorage.svc.cluster.local:80
            - --conf
            - spark.hadoop.fs.s3a.access.key=data-lake
            - --conf
            - spark.hadoop.fs.s3a.secret.key=12620ee6-2162-11ee-be56-0242ac120002
            - --conf
            - spark.hadoop.fs.s3a.path.style.access=true
            - --conf
            - spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
            - --conf
            - spark.hadoop.fs.s3a.connection.ssl.enabled=false
            # Hive metastore
            - --conf
            - spark.sql.warehouse.dir=file:///tmp/spark-warehouse
            - --conf
            - spark.hive.server2.thrift.port=10000
            - --conf
            - spark.hive.server2.thrift.bind.host=0.0.0.0
          ports:
            - name: thrift
              containerPort: 10000
            - name: spark-ui
              containerPort: 4040
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          readinessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: spark-thrift
  namespace: spark-rapids
spec:
  type: LoadBalancer
  selector:
    app: spark-thrift-server
  ports:
    - name: thrift
      port: 10000
      targetPort: 10000
    - name: spark-ui
      port: 4040
      targetPort: 4040
