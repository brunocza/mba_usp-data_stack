apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: fhvhv-gpu-pipeline
  namespace: spark-rapids
spec:
  type: Python
  mode: cluster
  image: bx-spark-rapids:3.5.2
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/work-dir/spark_gpu_pipeline.py
  arguments:
    - "3"
  sparkVersion: "3.5.2"
  restartPolicy:
    type: Never
  sparkConf:
    # RAPIDS GPU acceleration
    spark.plugins: "com.nvidia.spark.SQLPlugin"
    spark.rapids.sql.enabled: "true"
    spark.rapids.sql.explain: "NOT_ON_GPU"
    spark.rapids.sql.concurrentGpuTasks: "1"
    spark.sql.shuffle.partitions: "8"
    spark.executor.memoryOverheadFactor: "0.2"
    # S3A / MinIO
    spark.hadoop.fs.s3a.endpoint: "http://minio.deepstorage.svc.cluster.local:80"
    spark.hadoop.fs.s3a.access.key: "data-lake"
    spark.hadoop.fs.s3a.secret.key: "12620ee6-2162-11ee-be56-0242ac120002"
    spark.hadoop.fs.s3a.path.style.access: "true"
    spark.hadoop.fs.s3a.impl: "org.apache.hadoop.fs.s3a.S3AFileSystem"
    spark.hadoop.fs.s3a.connection.ssl.enabled: "false"
    # GPU resource discovery
    spark.executor.resource.gpu.vendor: "nvidia.com"
    spark.executor.resource.gpu.discoveryScript: "/opt/spark/getGpusResources.sh"
    spark.executor.resource.gpu.amount: "1"
    spark.task.resource.gpu.amount: "1"
  driver:
    cores: 1
    memory: "2g"
    serviceAccount: spark
    labels:
      app: spark-gpu-pipeline
  executor:
    cores: 2
    instances: 1
    memory: "2g"
    gpu:
      name: "nvidia.com/gpu"
      quantity: 1
    labels:
      app: spark-gpu-pipeline
